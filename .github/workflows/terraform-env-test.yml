# CI/CD pipeline file for env - test

# ----------------------------------

name: "Terraform plan and apply for provisioning infra in env - test"

on:
 push:
  branches:
   - env-test
  paths:
   - "env/test/**"
   - "modules/**"

permissions:
 id-token: write
 contents: read

env:
 ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
 ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
 ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
 ARM_SKIP_PROVIDER_REGISTRATION: true

jobs:
 terraform-test:
  runs-on: ubuntu-latest
  defaults:
   run:
    working-directory: azure-landing-zone/env/test
  
  steps:
   - name: Checkout
     uses: actions/checkout@v4

   - name: Azure Login (OIDC)
     uses: azure/login@v2
     with:
      client-id: ${{ secrets.AZURE_CLIENT_ID }}
      tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

   - name: Terraform Init (Backend Injection)
     run: |
      terraform init \
       -backend-config="resource_group_name=${{ secrets.TFSTATE_RG }}" \
       -backend-config="storage_account_name=${{ secrets.TFSTATE_SA }}" \
       -backend-config="container_name=${{ secrets.TFSTATE_CONTAINER }}" \
       -backend-config="key=test-env.tfstate"

   - name: Terraform Format
     run: terraform fmt -check

   - name: Terraform Validate
     run: terraform validate

   - name: Terraform Plan
     run: terraform plan -var-file="test.tfvars"

   - name: Terraform Apply
     run: terraform apply -auto-approve -var-file="test.tfvars"